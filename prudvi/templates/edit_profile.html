{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card glass" style="max-width:600px">
    <h1 class="auth-title">✏️ Edit Profile</h1>
    <form method="POST" class="auth-form">
      <div class="form-row">
        <div class="form-group"><label>Full Name</label><input type="text" name="full_name" value="{{ current_user.full_name }}" required class="form-control"></div>
        <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ current_user.phone or '' }}" class="form-control"></div>
      </div>
      <div class="form-group"><label>Address</label><input type="text" name="address" value="{{ current_user.address or '' }}" class="form-control"></div>
      {% if current_user.role in ['donor','volunteer'] %}
      <div class="form-row">
        <div class="form-group"><label>Blood Group</label>
          <select name="blood_group" class="form-control">
            <option value="">—</option>
            {% for bg in blood_groups %}<option value="{{ bg }}" {% if current_user.blood_group==bg %}selected{% endif %}>{{ bg }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>Age</label><input type="number" name="age" value="{{ current_user.age or '' }}" class="form-control"></div>
      </div>
      <div class="form-group"><label>Gender</label>
        <select name="gender" class="form-control">
          <option value="">—</option>
          {% for g in genders %}<option value="{{ g }}" {% if current_user.gender==g %}selected{% endif %}>{{ g }}</option>{% endfor %}
        </select>
      </div>
      {% endif %}
      <div class="form-group"><label>New Password (leave blank to keep current)</label><input type="password" name="new_password" placeholder="New password..." class="form-control"></div>
      <button class="btn btn-primary btn-block">💾 Save Changes</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-outline btn-block mt-1">← Back to Dashboard</a>
    </form>
  </div>
</div>
{% endblock %}
